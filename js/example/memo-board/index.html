<!DOCTYPE html>
<!--
  index.html — 메모보드 미니 프로젝트
  =====================================
  ch01 · ch02 · ch03 학습 내용을 조합한 간단한 메모 앱입니다.

  적용 개념:
    ch01 — DocumentFragment, 이벤트 위임
    ch02 — async/await, fetch, try/catch/finally
    ch03 — localStorage, 불변성(spread), 테마 저장
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모보드</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== 헤더 ===== -->
  <header class="header">
    <h1>📝 메모보드</h1>
    <!-- 클릭 시 app.js에서 body.className을 바꾸고 localStorage에 저장합니다 -->
    <button id="btn-theme">🌙 다크</button>
  </header>

  <main class="container">

    <!-- ===== 오늘의 추천 할 일 (fetch API 데모) ===== -->
    <section class="card" id="suggestion-section">
      <h2 class="section-title">💡 오늘의 추천 할 일</h2>
      <p class="desc">jsonplaceholder API에서 랜덤으로 할 일을 불러옵니다.</p>

      <!-- async/await로 불러온 데이터가 여기 표시됩니다 -->
      <p id="suggestion" class="suggestion-text">불러오는 중…</p>

      <button id="btn-refresh" class="btn btn-secondary">🔄 다시 불러오기</button>
    </section>

    <!-- ===== 메모 입력 영역 ===== -->
    <section class="card">
      <h2 class="section-title">✏️ 새 메모 추가</h2>

      <div class="input-row">
        <input
          type="text"
          id="memo-input"
          placeholder="메모를 입력하고 Enter 또는 추가 버튼을 누르세요"
          maxlength="100"
        >
        <button id="btn-add" class="btn btn-primary">추가</button>
      </div>
    </section>

    <!-- ===== 메모 목록 ===== -->
    <section class="card">
      <!-- 메모 개수는 render() 함수가 실행될 때마다 업데이트됩니다 -->
      <h2 class="section-title">
        🗂️ 내 메모
        <span id="memo-count" class="count-badge">총 0개</span>
      </h2>

      <!--
        이벤트 위임(ch01): 자식 삭제 버튼마다 리스너를 달지 않고
        부모인 memo-list 하나에만 클릭 리스너를 등록합니다.
        동적으로 추가된 버튼도 자동으로 처리됩니다.
      -->
      <div id="memo-list" class="memo-list">
        <p class="empty-msg">아직 메모가 없습니다.</p>
      </div>
    </section>

  </main>

  <!--
    defer: HTML 파싱이 끝난 후 실행 → DOM 요소를 안전하게 참조할 수 있습니다.
    type="module" 대신 defer를 사용하여 별도 HTTP 서버 없이 바로 열 수 있습니다.
  -->
  <script defer src="app.js"></script>
</body>
</html>
