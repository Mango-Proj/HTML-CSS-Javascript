<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 웹 폰트: 구글 폰트 <link> 방식으로 불러오기
       - Noto Sans KR: 한국어에 최적화된 폰트
       - wght@400;700 → 일반체(400)와 굵은체(700) 두 가지 굵기만 요청
       - display=swap → 폰트 로딩 전까지 시스템 폰트로 먼저 보여주고 나중에 교체 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <title>CSS 텍스트 스타일링</title>
</head>
<body>

  <!-- 전체 텍스트 예제를 감싸는 컨테이너 -->
  <div class="text-container">

    <!-- .title: font-size, font-weight, text-align, color, letter-spacing, text-decoration 예제 -->
    <h1 class="title">CSS Typography 텍스트 디자인</h1>

    <!-- .content: font-size, word-spacing, text-align(justify) 예제 -->
    <!-- .highlight: color, font-weight, font-style 조합으로 강조 효과 예제 -->
    <p class="content">
      CSS를 활용하면 글자의 크기, 색상뿐만 아니라 자간과 행간까지
      세밀하게 조절하여 <span class="highlight">최적의 가독성</span>을 제공할 수 있습니다.
    </p>

    <!-- .shadow-text: text-shadow 예제 (가로offset 세로offset 번짐 색상) -->
    <p class="shadow-text">그림자 효과가 적용된 텍스트입니다.</p>

  </div>

</body>
</html>
