<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>CSS 박스 모델</title>
</head>
<body>

  <!-- .box-container: 부모 요소
       - padding으로 자식 박스와 컨테이너 경계 사이의 내부 여백 확인 -->
  <div class="box-container">

    <!-- .styled-box: 박스 모델 핵심 속성 종합 예제
         Content  → width, height로 크기 지정
         Padding  → 콘텐츠와 테두리 사이의 내부 여백
         Border   → 두께·스타일·색상 + border-radius로 모서리 처리
         Margin   → 외부 여백, auto로 수평 중앙 정렬 -->
    <div class="styled-box">박스 모델 연습</div>

    <!-- .box-sizing 비교 예제
         content-box(기본): width에 padding·border가 추가되어 실제 크기가 더 커짐
         border-box        : width 안에 padding·border가 포함되어 실제 크기가 고정됨 -->
    <div class="box-sizing-demo content-box">content-box (기본값)<br>실제 너비 = 200 + 40 + 10 = 250px</div>
    <div class="box-sizing-demo border-box">border-box<br>실제 너비 = 200px 고정</div>

  </div>

</body>
</html>
