<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>CSS 선택자 연습</title>
</head>
<body>

  <!-- .container: 자식/자손 선택자의 기준이 되는 부모 요소 -->
  <div class="container">

    <!-- #main-title: 아이디 선택자(#) 예제 - 페이지 내 유일한 요소에 사용 -->
    <h1 id="main-title">CSS 선택자 연습</h1>

    <!-- .text: 클래스 선택자(.) 예제 - 동일 스타일을 여러 요소에 재사용 -->
    <!-- .text.blue: 교집합 선택자 예제 - 두 클래스를 동시에 가진 요소에만 적용 -->
    <p class="text blue">첫 번째 문단 (클래스 2개: text + blue)</p>
    <p class="text">두 번째 문단 (클래스 1개: text)</p>

    <!--
      자식 vs 자손 선택자 비교 예제
      - .container > p : 위의 <p class="text ..."> 만 해당 (직계 자식)
      - .container p  : 위의 <p>들 + 아래 <li> 안의 <p>까지 모두 해당 (자손 전체)
    -->
    <ul>
      <li>목록 1
        <!-- 이 <p>는 .container의 자손이지만 직계 자식은 아님 → '>' 선택자에 해당 안됨 -->
        <p>목록 내부의 자손 p태그</p>
      </li>
      <li>목록 2</li>
    </ul>

    <!--
      형제 선택자 비교 예제 (세 span은 모두 같은 부모 아래 형제)
      - span + span : "형제 2"만 선택 (바로 인접한 다음 형제 하나)
      - span ~ span : "형제 2"와 "형제 3" 모두 선택 (이후 모든 형제)
    -->
    <span>형제 1 (기준)</span>
    <span>형제 2 (인접 형제: +)</span>
    <span>형제 3 (일반 형제: ~)</span>

  </div>

</body>
</html>
