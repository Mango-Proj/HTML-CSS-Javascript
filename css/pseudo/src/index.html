<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>CSS 가상 요소와 가상 클래스</title>
</head>
<body>

  <div class="menu-container">
    <h2>분식 메뉴판</h2>

    <ul>
      <!--
        각 .menu-item에 적용되는 가상 선택자:
        ::before      → 항목 앞에 🍴 아이콘 삽입 (가상 요소)
        ::after       → 항목 뒤에 "(추천)" 텍스트 삽입 (가상 요소)
        :nth-child(even) → 짝수 번째 항목(순대, 어묵) 배경색 변경 (구조 가상 클래스)
        :first-child  → 첫 번째 항목(떡볶이) 상단 테두리 추가 (구조 가상 클래스)
        :hover        → 마우스 올리면 배경색 변경 (상태 가상 클래스)
      -->
      <li class="menu-item">떡볶이</li>  <!-- 1번째: :first-child 적용 -->
      <li class="menu-item">순대</li>    <!-- 2번째: :nth-child(even) 적용 -->
      <li class="menu-item">튀김</li>    <!-- 3번째 -->
      <li class="menu-item">어묵</li>    <!-- 4번째: :nth-child(even) 적용 -->
      <li class="menu-item">라면</li>    <!-- 5번째: :last-child -->
    </ul>

    <!--
      input:focus → 입력창 클릭 시 파란 테두리와 배경색 변경 (상태 가상 클래스)
      ::selection → 텍스트를 드래그로 선택하면 노란 배경으로 변경 (가상 요소)
    -->
    <form>
      <input type="text" placeholder="검색어를 입력하세요">
      <button type="submit">검색</button>
    </form>
  </div>

</body>
</html>
