<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGIN — Dark UI</title>

  <!-- 구글 폰트: Inter (영문/숫자) + Noto Sans KR (한글) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--
    배경 장식 원 두 개 (CSS ::before/::after 대신 div 사용)
    position: fixed 로 항상 배경에 고정됩니다.
  -->
  <div class="bg-blob bg-blob--1" aria-hidden="true"></div>
  <div class="bg-blob bg-blob--2" aria-hidden="true"></div>

  <!-- 로그인 카드 -->
  <div class="login-card">

    <!-- 로고 / 타이틀 -->
    <div class="card-header">
      <div class="logo">✦</div>
      <h1 class="card-title">LOGIN PAGE</h1>
      <p class="card-sub">Please login with your account!</p>
    </div>

    <!-- 로그인 폼
         action이 없으면 같은 페이지로 제출 (데모이므로 JS로 막습니다) -->
    <form class="login-form" onsubmit="return false;">

      <!-- 이메일 입력 -->
      <div class="field">
        <label for="email" class="field-label">E-mail</label>
        <!--
          type="email": 이메일 형식 검증 + 모바일에서 이메일 키보드 표시
          autocomplete: 브라우저 자동완성 힌트
        -->
        <input
          type="email"
          id="email"
          class="field-input"
          placeholder="hello@example.com"
          autocomplete="email"
        >
      </div>

      <!-- 비밀번호 입력 -->
      <div class="field">
        <label for="password" class="field-label">
          Password
          <a href="#" class="forgot-link">Find Password</a>
        </label>
        <!--
          type="password": 입력값을 ● 로 가림
          autocomplete="current-password": 비밀번호 매니저 연동
        -->
        <input
          type="password"
          id="password"
          class="field-input"
          placeholder="Please enter your password."
          autocomplete="current-password"
        >
      </div>

      <!-- 로그인 버튼 -->
      <button type="submit" class="btn-login">
        LOGIN
      </button>

    </form>

    <!-- 구분선 + 소셜 로그인 안내 -->
    <div class="divider">
      <span class="divider-text">또는</span>
    </div>

    <!-- 하단 회원가입 유도 -->
    <p class="signup-text">
      Do not have your account? <a href="#" class="signup-link">Register</a>
    </p>

  </div>
  <!-- /.login-card -->

</body>
</html>
