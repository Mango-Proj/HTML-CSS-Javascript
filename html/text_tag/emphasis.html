<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글자 강조 태그 (b, strong, i, em) 예제</title>

    <!--
        [emphasis.html]
        학습 목표: 시각적 강조 태그와 의미적 강조 태그의 차이 이해

        핵심 구분:
        - <b>      : Bold — 단순 굵게 표시 (의미 없음)
        - <strong> : Strong Importance — 내용이 중요함을 의미 (스크린 리더가 강조 읽음)
        - <i>      : Italic — 단순 기울임 표시 (의미 없음)
        - <em>     : Emphasis — 문장 내 특정 단어를 의미적으로 강조 (기울임 표시)

        ⚠️  시각적 결과는 같아 보여도 의미(Semantic)가 다릅니다.
            접근성과 SEO를 위해 의미에 맞는 태그를 선택하세요.
    -->

    <style>
        /* ── 기본 페이지 스타일 ────────────────────────────────── */
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f5f7fa;
            color: #333;
            max-width: 680px;
            margin: 48px auto;
            padding: 0 24px;
            line-height: 1.9;
        }

        /* ── 섹션 레이블 ───────────────────────────────────────── */
        h2 {
            font-size: 0.85rem;
            color: #999;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 6px;
            margin-top: 40px;
        }

        /* ── 문단 카드 ─────────────────────────────────────────── */
        p {
            background-color: #fff;
            border-radius: 6px;
            padding: 14px 18px;
            margin: 10px 0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
            font-size: 0.97rem;
        }

        /* ── <b>: 시각적 굵게 — 중립적인 색으로 표현 ─────────── */
        b {
            color: #555;
        }

        /* ── <strong>: 의미적 강조 — 강한 색으로 중요도 표현 ─── */
        strong {
            color: #c0392b;
            background-color: #fdecea;
            padding: 0 3px;
            border-radius: 3px;
        }

        /* ── <i>: 시각적 기울임 — 중립적 색으로 표현 ──────────── */
        i {
            color: #777;
        }

        /* ── <em>: 의미적 강조 — 포인트 색으로 강조 표현 ────────  */
        em {
            color: #2980b9;
            font-style: italic;
        }

        /* ── 비교 안내 박스 ────────────────────────────────────── */
        .note {
            background-color: #fffbea;
            border-left: 4px solid #f1c40f;
            border-radius: 4px;
            padding: 12px 16px;
            font-size: 0.88rem;
            color: #7d6608;
            margin-top: 32px;
        }
    </style>
</head>
<body>

    <!-- ── 굵게 표시하기 ────────────────────────────────────────────
         <b>와 <strong>은 둘 다 굵게 보이지만 의미가 다릅니다.
         - <b>    : 별다른 의미 없이 시각적으로만 굵게 표시
         - <strong>: "이 내용은 매우 중요하다"는 의미를 함께 전달
                    스크린 리더(Screen Reader)가 강조된 톤으로 읽어줍니다.
    ──────────────────────────────────────────────────────────────── -->
    <h2>굵게 표시 — b vs strong</h2>

    <!-- <b>: 시각적 굵게. 의미론적으로 중립 -->
    <p>이 단어는 단순히 <b>굵게</b> 보입니다.</p>

    <!-- <strong>: 의미적 강조. "매우 중요"한 내용임을 명시 -->
    <p>이 문장은 <strong>매우 중요</strong>하므로 강조합니다.</p>


    <!-- ── 기울여 표시하기 ──────────────────────────────────────────
         <i>와 <em>도 둘 다 기울임(Italic)으로 보이지만 의미가 다릅니다.
         - <i>  : 기술 용어, 관용구, 생각 등 스타일링 목적
         - <em> : "이 단어를 특별히 강조하고 싶다"는 의미를 함께 전달
    ──────────────────────────────────────────────────────────────── -->
    <h2>기울여 표시 — i vs em</h2>

    <!-- <i>: 시각적 기울임. 의미론적으로 중립 -->
    <p>나는 <i>Italic</i> 스타일로 표시됩니다.</p>

    <!-- <em>: 의미적 강조. 독자가 이 단어에 주목하길 바랄 때 사용 -->
    <p>나는 <em>Emphasis</em>로 의미까지 강조됩니다.</p>


    <!-- ── 비교 안내 ────────────────────────────────────────────────
         시각적으로는 동일해 보여도 스크린 리더·SEO에서 차이가 납니다.
         중요한 정보에는 반드시 <strong>/<em>을 사용하세요.
    ──────────────────────────────────────────────────────────────── -->
    <p class="note">
        💡 <b>시각적 결과는 같아도 의미가 다릅니다.</b><br>
        접근성(스크린 리더)과 SEO를 위해 중요한 내용에는 <code>&lt;strong&gt;</code> / <code>&lt;em&gt;</code>을 사용하세요.
    </p>

</body>
</html>
