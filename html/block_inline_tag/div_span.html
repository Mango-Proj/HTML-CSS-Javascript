<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div와 span 비교 예제</title>

    <!--
        [div_span.html]
        학습 목표: <div>와 <span>의 차이와 올바른 활용법 이해

        <div> (Division)
        - 블록 레벨 요소 — 새 줄에서 시작, 가로 전체 너비 차지
        - 자체적인 의미(Semantic)는 없음
        - 블록/인라인 요소를 모두 자식으로 포함 가능
        - 주로 레이아웃 구성, 섹션 그룹화에 사용

        <span>
        - 인라인 요소 — 줄 흐름 안에 배치, 콘텐츠 너비만큼만 차지
        - 자체적인 의미(Semantic)는 없음
        - 텍스트 일부에 스타일을 입히거나 JS로 선택할 때 사용
        - 블록 요소를 자식으로 포함할 수 없음

        ⚠️  의미 있는 구조에는 <div> 대신 <section>, <article>,
            <header>, <footer> 등 시맨틱 태그를 사용하는 것이 좋습니다.
    -->

    <style>
        /* ── 기본 페이지 스타일 ────────────────────────────────── */
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            max-width: 700px;
            margin: 48px auto;
            padding: 0 24px;
            line-height: 1.9;
        }

        /* ── 섹션 레이블 ───────────────────────────────────────── */
        h2 {
            font-size: 0.85rem;
            color: #999;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 6px;
            margin-top: 40px;
            margin-bottom: 12px;
        }

        /* ── <div> 예시 스타일 ─────────────────────────────────────
           기존 인라인 스타일을 외부 CSS로 분리하여 관리합니다.
           배경색으로 div가 가로 전체를 차지하는 블록임을 시각화합니다.
        ──────────────────────────────────────────────────────────── */
        .group-box {
            background-color: #e8ecf8;
            border: 1px solid #c5cfe8;
            border-left: 5px solid #5b8dee;
            border-radius: 6px;
            padding: 16px 20px;
        }

        /* div 안의 h2 — 그룹 제목 */
        .group-box h2 {
            font-size: 1rem;
            color: #1a3a7e;
            border: none;
            letter-spacing: 0;
            text-transform: none;
            margin: 0 0 8px 0;
            padding: 0;
        }

        /* div 안의 p */
        .group-box p {
            margin: 0;
            font-size: 0.96rem;
            color: #333;
        }

        /* div 안 span — 인라인 요소를 품은 경우 표시 */
        .group-box span {
            background-color: #5b8dee;
            color: #fff;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }

        /* ── <span> 예시 스타일 ────────────────────────────────────
           기존 인라인 스타일을 외부 CSS 클래스로 분리합니다.
        ──────────────────────────────────────────────────────────── */

        /* 문단 카드 */
        .text-card {
            background-color: #fff;
            border-radius: 6px;
            padding: 16px 20px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        }

        .text-card p {
            margin: 6px 0;
            font-size: 0.96rem;
        }

        /* span.highlight: 강조 텍스트 — 빨강 + 굵게 */
        span.highlight {
            color: #c0392b;
            font-weight: bold;
        }

        /* span.underline: 밑줄 강조 */
        span.underline {
            text-decoration: underline;
            color: #2980b9;
        }
    </style>
</head>
<body>

    <!-- ── <div> 예시 ───────────────────────────────────────────────
         <div>는 블록 레벨 컨테이너입니다.
         내부에 <h2>(블록)와 <p> 안의 <span>(인라인)을 동시에 포함합니다.
         이처럼 <div>는 블록/인라인 요소를 모두 자식으로 가질 수 있습니다.
    ──────────────────────────────────────────────────────────────── -->
    <h2>div — 블록 컨테이너</h2>

    <!--
        기존: style="background-color: lightgrey; padding: 10px;"
        개선: 인라인 스타일 대신 class="group-box"로 외부 CSS 적용
    -->
    <div class="group-box">
        <!-- 블록 요소(<h2>)를 div 안에 포함한 예시 -->
        <h2>그룹 제목</h2>

        <!-- 인라인 요소(<span>)와 블록 요소(<p>)가 공존하는 예시 -->
        <p>div는 이렇게 <span>인라인 요소</span>와 블록 요소를 모두 묶을 수 있습니다.</p>
    </div>


    <!-- ── <span> 예시 ──────────────────────────────────────────────
         <span>은 인라인 요소로, 문장 흐름을 깨지 않고
         텍스트 일부에만 스타일을 입힐 때 사용합니다.
         두 <span> 모두 <p> 태그 안(인라인 흐름) 안에 위치합니다.
    ──────────────────────────────────────────────────────────────── -->
    <h2>span — 인라인 스타일 적용</h2>

    <div class="text-card">

        <!--
            기존: <span style="color: red; font-weight: bold;">꾸준함</span>
            개선: class="highlight"로 분리하여 재사용성 향상
        -->
        <p>
            HTML 공부는 <span class="highlight">꾸준함</span>이 가장 중요합니다.
        </p>

        <!--
            기존: <span style="text-decoration: underline;">p 태그</span>
            개선: class="underline"으로 분리
        -->
        <p>
            문단을 구성하는 <span class="underline">p 태그</span> 안에 사용되었습니다.
        </p>

    </div>

</body>
</html>
